name: flutter_sql_database_storage_using_sqlite_and_sqflite_crud_by_heyflutter_com
description: "Persist data in Local Database of your Android or iOS device with Sqlite and Sqflite plugin. Using Raw SQL statements perform Sqflite CRUD Operations Create, Read, Update and Delete."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.21
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

